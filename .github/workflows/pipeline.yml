name: CI Pipeline Level 5

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pipeline-lab

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run dependency scan
        run: pip-audit -r requirements.txt

  build-and-publish:
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: |
          docker build -t $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} .
          docker push $IMAGE_NAME:${{ steps.meta.outputs.image_tag }}

  terraform-check:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform init
      - run: terraform validate
      - run: terraform plan

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-and-publish, terraform-check]
    steps:
      - uses: actions/checkout@v4
      - run: ./deploy.sh dev $IMAGE_NAME:${{ needs.build-and-publish.outputs.image_tag }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - run: echo "Running integration tests..."

  deploy-prod:
    runs-on: ubuntu-latest
    needs: integration-tests
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4
      - run: ./deploy.sh prod $IMAGE_NAME:${{ needs.build-and-publish.outputs.image_tag }}