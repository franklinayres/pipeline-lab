name: 04 - Build and Publish

on:
  workflow_call:
    outputs:
      image_tag:
        description: "Docker image tag"
        value: ${{ jobs.build.outputs.image_tag }}
      image_ref:
        description: "Full Docker image reference"
        value: ${{ jobs.build.outputs.image_ref }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pipeline-lab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} .
          docker tag $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} $IMAGE_NAME:latest

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          cache: true
          version: v0.69.3

      - name: Trivy image scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            $IMAGE_NAME:${{ steps.meta.outputs.image_tag }}

      - name: Push image
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          docker push $IMAGE_NAME:${{ steps.meta.outputs.image_tag }}
          docker push $IMAGE_NAME:latest